// ── Mouth ─────────────────────────────────────────────────────────────────────
function drawPersonaMouth(ctx,x,y,openAmt,c,persona,flush){
  const w=persona==="grace"?32:persona==="luna"?26:28;
  ctx.fillStyle=c.lip;
  ctx.beginPath();
  // Upper lip — persona specific cupid's bow
  if(persona==="alexia"){
    // Kendall: full lips, soft cupid bow
    ctx.moveTo(x-w,y); ctx.bezierCurveTo(x-w+5,y-7,x-9,y-9,x,y-4);
    ctx.bezierCurveTo(x+9,y-9,x+w-5,y-7,x+w,y);
  } else if(persona==="luna"){
    // Bella: pronounced cupid bow, slightly pouty
    ctx.moveTo(x-w,y); ctx.bezierCurveTo(x-w+4,y-8,x-8,y-11,x,y-5);
    ctx.bezierCurveTo(x+8,y-11,x+w-4,y-8,x+w,y);
  } else {
    // Anok: fuller lips, wider
    ctx.moveTo(x-w,y); ctx.bezierCurveTo(x-w+6,y-6,x-10,y-8,x,y-3);
    ctx.bezierCurveTo(x+10,y-8,x+w-6,y-6,x+w,y);
  }
  ctx.bezierCurveTo(x+w-4,y+3,x+4,y+3+openAmt*18,x,y+3+openAmt*18);
  ctx.bezierCurveTo(x-4,y+3+openAmt*18,x-w+4,y+3,x-w,y);
  ctx.closePath(); ctx.fill();

  if(openAmt>0.05){
    ctx.fillStyle="#1a0404";
    ctx.beginPath(); ctx.ellipse(x,y+openAmt*9+2,w*0.62,openAmt*10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#fffff5";
    ctx.beginPath(); ctx.ellipse(x,y+openAmt*5+1,w*0.5,openAmt*5,0,0,Math.PI*2); ctx.fill();
  }
  // Lip outline
  ctx.strokeStyle=darken(c.lip,25); ctx.lineWidth=1.1; ctx.lineCap="round";
  ctx.beginPath();
  if(persona==="alexia"){ ctx.moveTo(x-w,y); ctx.bezierCurveTo(x-w+5,y-7,x-9,y-9,x,y-4); ctx.bezierCurveTo(x+9,y-9,x+w-5,y-7,x+w,y); }
  else if(persona==="luna"){ ctx.moveTo(x-w,y); ctx.bezierCurveTo(x-w+4,y-8,x-8,y-11,x,y-5); ctx.bezierCurveTo(x+8,y-11,x+w-4,y-8,x+w,y); }
  else { ctx.moveTo(x-w,y); ctx.bezierCurveTo(x-w+6,y-6,x-10,y-8,x,y-3); ctx.bezierCurveTo(x+10,y-8,x+w-6,y-6,x+w,y); }
  ctx.stroke();

  if(flush>0.25){
    ctx.strokeStyle=`rgba(255,80,80,${flush*0.35})`; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.arc(x-w+3,y+8,10,-0.6,0.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+w-3,y+8,10,Math.PI-0.9,Math.PI+0.6); ctx.stroke();
  }
}

function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,((n>>16)&0xff)+amt), g=Math.min(255,((n>>8)&0xff)+amt), b=Math.min(255,(n&0xff)+amt);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,"0")}`;
}
function darken(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,((n>>16)&0xff)-amt), g=Math.max(0,((n>>8)&0xff)-amt), b=Math.max(0,(n&0xff)-amt);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,"0")}`;
}


// ─── VOICE MODE ───────────────────────────────────────────────────────────────
function VoiceMode({ profile, onUpdateProfile }) {
  const [persona, setPersona]       = useState("alexia");
  const [phase, setPhase]           = useState("idle");   // idle | listening | thinking | talking
  const [transcript, setTranscript] = useState("");
  const [lastUserLine, setLastUserLine] = useState("");
  const [lastReply, setLastReply]   = useState("");
  const [rizz, setRizz]             = useState(0);
  const [celebrate, setCelebrate]   = useState(false);
  const [statusText, setStatusText] = useState("Tap the mic to start talking");
  const [supported, setSupported]   = useState(true);

  const apiHistory = useRef([]);
  const synthRef   = useRef(window.speechSynthesis);
  const recognRef  = useRef(null);
  const isTalking  = phase === "talking";
  const isListening= phase === "listening";
  const p          = PERSONAS[persona];

  useEffect(()=>{
    if(!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)){
      setSupported(false);
    }
    return ()=>{ synthRef.current?.cancel(); recognRef.current?.abort(); };
  },[]);

  function resetChat(){
    synthRef.current?.cancel();
    recognRef.current?.abort();
    apiHistory.current = [];
    setPhase("idle"); setRizz(0); setTranscript(""); setLastUserLine(""); setLastReply("");
    setStatusText("Tap the mic to start talking");
  }

  useEffect(()=>{ resetChat(); },[persona]);

  function stopAll(){
    synthRef.current?.cancel();
    recognRef.current?.abort();
    setPhase("idle");
    setStatusText("Your turn — tap mic 🎙️");
  }

  function startListeningFixed(){
    if(!supported){ setStatusText("Speech recognition not supported in this browser."); return; }
    synthRef.current?.cancel();
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recog = new SpeechRecognition();
    recognRef.current = recog;
    recog.continuous = false; recog.interimResults = true; recog.lang = "en-US";
    setPhase("listening"); setTranscript(""); setStatusText("Listening... 🎙️");
    let finalText = "";
    recog.onresult = (e)=>{
      let interim = "";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) finalText += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      setTranscript(finalText||interim);
    };
    recog.onerror = ()=>{ setPhase("idle"); setStatusText("Mic error — try again"); };
    recog.onend   = ()=>{
      if(finalText.trim()) handleUserSpeech(finalText.trim());
      else { setPhase("idle"); setStatusText("Didn't catch that — tap mic again"); }
    };
    recog.start();
  }

  async function handleUserSpeech(text){
    setLastUserLine(text);
    setPhase("thinking");
    setStatusText("She's thinking... 💭");
    apiHistory.current = [...apiHistory.current, { role:"user", content:text }];
    try {
      const parsed = await callAI(p.system, apiHistory.current);
      const score  = Math.min(100, Math.max(0, parsed.rizzScore||0));
      setRizz(score);
      if(score>(profile?.peakPracticeRizz||0)) onUpdateProfile({peakPracticeRizz:score});
      if(score>(profile?.peakGameRizz||0))     onUpdateProfile({peakGameRizz:score});
      apiHistory.current = [...apiHistory.current, { role:"assistant", content: parsed.reply||"..." }];
      const reply = parsed.reply || "Hmm.";
      setLastReply(reply);
      if(score>=100){ setCelebrate(true); setTimeout(()=>setCelebrate(false),3500); }
      speakReply(reply);
    } catch {
      setPhase("idle");
      setStatusText("Error — tap mic to retry");
    }
  }

  function speakReply(text){
    synthRef.current?.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    const voices = synthRef.current?.getVoices()||[];
    const preferred = voices.find(v=>
      v.name.toLowerCase().includes("female")||
      v.name.includes("Samantha")||v.name.includes("Google UK English Female")||
      v.name.includes("Microsoft Zira")||v.name.includes("Karen")
    );
    if(preferred) utt.voice = preferred;
    utt.pitch = persona==="luna"?1.1:persona==="grace"?1.0:1.05;
    utt.rate  = persona==="grace"?1.05:0.92;
    utt.onstart = ()=>{ setPhase("talking"); setStatusText("She's talking... 💬"); };
    utt.onend   = ()=>{ setPhase("idle");   setStatusText("Your turn — tap mic 🎙️"); };
    synthRef.current?.speak(utt);
  }

  if(!supported) return (
    <div style={{maxWidth:560,margin:"0 auto",padding:20}}>
      <Card style={{padding:40,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>🎤</div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:3,marginBottom:10}}>VOICE MODE</div>
        <div style={{color:G.muted,fontSize:14,lineHeight:1.6}}>
          Voice mode requires Chrome or Edge browser.<br/>
          Safari and Firefox do not support the Web Speech API.
        </div>
      </Card>
    </div>
  );

  return (
    <div style={{maxWidth:560,margin:"0 auto",padding:20}}>
      {celebrate && <Confetti active/>}
      <div style={{display:"flex",flexDirection:"column",gap:18}}>

        {/* Persona picker */}
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          {Object.entries(PERSONAS).map(([k,v])=>(
            <button key={k} onClick={()=>setPersona(k)}
              style={{flex:1,padding:"10px 6px",fontFamily:"'Bebas Neue'",fontSize:15,letterSpacing:2,
                background:persona===k?`linear-gradient(135deg,${G.fire},${G.pink})`:"transparent",
                border:`2px solid ${persona===k?G.fire:G.border}`,color:persona===k?"#fff":G.muted,
                cursor:"pointer",clipPath:"polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)",transition:"all .2s"}}>
              {v.emoji} {v.name}
            </button>
          ))}
        </div>

        {/* Face + rizz bar */}
        <Card accent={`linear-gradient(90deg,${G.fire},${G.gold},${G.pink})`} style={{padding:20,textAlign:"center"}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:4,color:G.muted,marginBottom:10}}>
            {p.emoji} {p.name}
          </div>
          <AiFace isTalking={isTalking} isListening={isListening} rizzLevel={rizz} persona={persona}/>
          <div style={{marginTop:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:12,letterSpacing:2,color:G.muted}}>RIZZ LEVEL</span>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:15,color:rizz>=80?G.gold:rizz>=50?G.fire:G.muted}}>{rizz}%</span>
            </div>
            <RizzBar pct={rizz} color={rizz>=80?G.gold:rizz>=50?G.fire:G.pink}/>
          </div>
          {lastReply && (
            <div style={{marginTop:14,padding:"10px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${G.border}`,borderRadius:2,fontSize:13,color:G.text,fontStyle:"italic",textAlign:"left"}}>
              "{lastReply}"
            </div>
          )}
          {lastUserLine && (
            <div style={{marginTop:8,fontSize:11,color:G.muted,textAlign:"right"}}>You: "{lastUserLine}"</div>
          )}
        </Card>

        {/* Status */}
        <div style={{textAlign:"center",fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:3,color:G.muted,minHeight:24}}>
          {phase==="thinking"?<TypingDots/>:<span>{statusText}</span>}
        </div>
        {isListening && transcript && (
          <div style={{textAlign:"center",fontSize:13,color:G.neon,fontStyle:"italic"}}>"{transcript}"</div>
        )}

        {/* Big mic button */}
        <div style={{textAlign:"center"}}>
          <button
            onClick={phase==="idle" ? startListeningFixed : stopAll}
            style={{
              width:100,height:100,borderRadius:"50%",
              background:isListening
                ?`radial-gradient(circle,#00FFB2,#009966)`
                :phase==="talking"||phase==="thinking"
                  ?`radial-gradient(circle,${G.muted},#333)`
                  :`radial-gradient(circle,${G.fire},${G.pink})`,
              border:"none",cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:38,margin:"0 auto",
              boxShadow:isListening
                ?`0 0 0 8px rgba(0,255,178,0.2),0 0 0 16px rgba(0,255,178,0.08)`
                :`0 0 30px rgba(255,77,0,0.4)`,
              transition:"all .3s",
              animation:isListening?"pulse 1s ease-in-out infinite":"none",
            }}
          >
            {isListening?"🔴":phase==="talking"?"🔇":"🎙️"}
          </button>
          <div style={{marginTop:10,fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:2,color:G.muted}}>
            {isListening?"TAP TO STOP":phase==="talking"?"SKIP":"TAP TO SPEAK"}
          </div>
        </div>

        {/* Tips */}
        <Card style={{padding:14}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:11,letterSpacing:3,color:G.muted,marginBottom:8}}>💡 VOICE TIPS</div>
          {[["🎤","Speak clearly and naturally"],["😏","Tone matters — confident and smooth"],["⏳","Give it a second after you stop talking"],["🔇","Tap mic again to interrupt her"]].map(([ic,tip])=>(
            <div key={tip} style={{fontSize:11,color:G.muted,padding:"4px 0",borderBottom:`1px solid rgba(255,255,255,0.04)`,display:"flex",gap:6}}><span>{ic}</span>{tip}</div>
          ))}
        </Card>

        <Btn onClick={resetChat} v="ghost" style={{width:"100%",fontSize:13,padding:"9px"}}>↩ RESET CONVERSATION</Btn>
      </div>
    </div>
  );
}

// ─── API KEY SCREEN ──────────────────────────────────────────────────────────
function ApiKeyScreen({onSave}){
  const [val,setVal] = useState("");
  const [err,setErr] = useState("");
  function submit(){
    const k = val.trim();
    if(!k){ setErr("Please enter your Anthropic API key."); return; }
    if(!k.startsWith("sk-ant-")){ setErr("Invalid key — should start with sk-ant-"); return; }
    onSave(k);
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:G.dark}}>
      <div style={{maxWidth:460,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:"clamp(56px,14vw,96px)",letterSpacing:10,background:`linear-gradient(135deg,${G.fire},${G.gold},${G.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"flicker 4s ease-in-out infinite",lineHeight:1}}>RIZZ ME</div>
          <div style={{fontFamily:"'Permanent Marker'",color:G.muted,fontSize:13,letterSpacing:2,marginTop:6}}>⚡ Can you make the AI blush? ⚡</div>
        </div>
        <Card accent={`linear-gradient(90deg,${G.fire},${G.gold},${G.pink})`} style={{padding:28}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:3,color:G.muted,marginBottom:8}}>🔑 ANTHROPIC API KEY</div>
          <div style={{fontSize:13,color:G.muted,marginBottom:16,lineHeight:1.7}}>
            This app calls Claude directly from your browser.<br/>
            Your key is stored only in <strong style={{color:G.text}}>your browser</strong> and sent only to Anthropic.<br/>
            Get a free key at <a href="https://console.anthropic.com" target="_blank" style={{color:G.fire,textDecoration:"none"}}>console.anthropic.com</a>
          </div>
          <input
            value={val}
            onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            placeholder="sk-ant-api03-..."
            type="password"
            style={{width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${err?G.pink:G.border}`,color:G.text,fontSize:13,padding:"11px 14px",borderRadius:2,outline:"none",fontFamily:"monospace",marginBottom:err?6:14}}
          />
          {err && <div style={{fontSize:12,color:G.pink,marginBottom:10}}>{err}</div>}
          <Btn onClick={submit} style={{width:"100%",fontSize:17,padding:14}}>ENTER THE ARENA 🔥</Btn>
        </Card>
        <div style={{textAlign:"center",marginTop:12,fontSize:11,color:G.muted}}>
          Key stored locally · Never shared · Standard API fees apply
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const [apiKey,setApiKey]     = useState(()=>localStorage.getItem("rizz_key")||"");
  const [profile,setProfile]   = useState(null);
  const [booting,setBooting]   = useState(true);
  const [tab,setTab]           = useState("practice");
  const profileRef             = useRef(null);

  useEffect(()=>{
    if(!apiKey){ setBooting(false); return; }
    (async()=>{
      try{
        const sess = await window.storage.get("my-session");
        if(sess){
          const {email} = JSON.parse(sess.value);
          const key = emailKey(email);
          const acc = await window.storage.get(key,true);
          if(acc){
            const p = JSON.parse(acc.value);
            profileRef.current = p;
            setProfile(p);
          }
        }
      }catch{}
      setBooting(false);
    })();
  },[apiKey]);

  async function updateProfile(updates){
    const base = profileRef.current || {};
    const np = {...base,...updates};
    profileRef.current = np;
    setProfile({...np});
    try{
      const key = emailKey(np.email||"");
      await window.storage.set(key, JSON.stringify(np), true);
      await window.storage.set(`player-${(np.name||"unknown").toLowerCase()}`, JSON.stringify(np), true);
      await window.storage.set("my-session", JSON.stringify({email:np.email||""}));
    }catch(e){ console.error("save failed",e); }
  }

  async function logout(){
    try{ await window.storage.delete("my-session"); }catch{}
    profileRef.current = null;
    setProfile(null);
    setTab("practice");
  }

  const TABS = [
    {k:"practice",l:"🎯 PRACTICE"},
    {k:"voice",   l:"🎤 VOICE MODE"},
    {k:"ranked",  l:"⚔️ RANKED"},
    {k:"leaderboard",l:"🏆 LEADERBOARD"},
  ];

  if(!apiKey) return(
    <><style>{CSS}</style>
    <ApiKeyScreen onSave={k=>{ localStorage.setItem("rizz_key",k); setApiKey(k); setBooting(true); }}/>
    </>
  );

  if(booting) return(
    <><style>{CSS}</style>
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <Spinner/>
    </div></>
  );

  if(!profile) return(
    <><style>{CSS}</style>
    <AuthScreen onComplete={p=>{ profileRef.current=p; setProfile(p); }}/>
    </>
  );

  const rank = getRank(profile.mmr||0);

  return(
    <>
      <style>{CSS}</style>
      <div style={{position:"fixed",inset:0,background:`radial-gradient(ellipse at 18% 50%,rgba(255,77,0,0.055) 0%,transparent 52%),radial-gradient(ellipse at 82% 18%,rgba(255,45,120,0.055) 0%,transparent 52%)`,pointerEvents:"none"}}/>

      <header style={{textAlign:"center",padding:"36px 20px 24px"}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:"clamp(46px,10vw,96px)",letterSpacing:10,background:`linear-gradient(135deg,${G.fire},${G.gold},${G.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"flicker 4s ease-in-out infinite",lineHeight:1}}>RIZZ ME</div>
        <div style={{fontFamily:"'Permanent Marker'",color:G.muted,fontSize:12,letterSpacing:2,marginTop:5}}>⚡ Can you make the AI blush? ⚡</div>
        <div style={{display:"inline-flex",alignItems:"center",gap:10,marginTop:12,padding:"7px 15px",background:G.card,border:`1px solid ${G.border}`,borderRadius:2}}>
          <span style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:2,color:G.muted}}>📧</span>
          <span style={{fontFamily:"'Bebas Neue'",fontSize:14,letterSpacing:2}}>{profile.name}</span>
          <RankBadge mmr={profile.mmr||0}/>
          <span style={{fontSize:11,color:G.muted}}>{profile.wins||0}W {profile.losses||0}L</span>
          <button onClick={logout} style={{background:"none",border:`1px solid ${G.border}`,color:G.muted,cursor:"pointer",fontSize:10,fontFamily:"'Bebas Neue'",letterSpacing:1,padding:"3px 8px",borderRadius:2}}>LOGOUT</button>
        </div>
      </header>

      <nav style={{display:"flex",justifyContent:"center",gap:9,padding:"0 20px 28px",flexWrap:"wrap"}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{fontFamily:"'Bebas Neue'",fontSize:17,letterSpacing:3,padding:"11px 30px",border:`2px solid ${tab===t.k?G.fire:G.border}`,background:tab===t.k?"rgba(255,77,0,0.14)":"transparent",color:tab===t.k?G.text:G.muted,cursor:"pointer",clipPath:"polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%)",transition:"all .2s"}}>
            {t.l}
          </button>
        ))}
      </nav>

      <main style={{padding:"0 18px 64px"}}>
        {tab==="practice"    && <PracticeMode    profile={profile} onUpdateProfile={updateProfile}/>}
        {tab==="voice"       && <VoiceMode       profile={profile} onUpdateProfile={updateProfile}/>}
        {/* Always mounted so polling and state survive tab switches */}
        <RankedBattle profile={profile} onUpdateProfile={updateProfile} visible={tab==="ranked"}/>
        {tab==="leaderboard" && <Leaderboard/>}
      </main>
    </>
  );
}


document.getElementById("boot").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
