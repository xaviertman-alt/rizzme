// ─── STORAGE (localStorage-based, works standalone) ───────────────────────────
const storage = {
  async get(key, shared=false){ try{ const v=localStorage.getItem((shared?"s:":"")+key); return v?{value:v}:null; }catch{return null;} },
  async set(key, value, shared=false){ try{ localStorage.setItem((shared?"s:":"")+key,value); return {value}; }catch{return null;} },
  async delete(key, shared=false){ try{ localStorage.removeItem((shared?"s:":"")+key); return {deleted:true}; }catch{return null;} },
  async list(prefix="", shared=false){ try{ const pf=(shared?"s:":"")+prefix; const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(pf)) keys.push(k.slice(shared?2:0)); } return {keys}; }catch{return {keys:[]};} },
};

const DIFFS = {

  luna:"Hi... I was just somewhere else in my head. Most conversations don't pull me back. Will yours? 🌙",

function getRank(mmr=0){ return [...RANKS].reverse().find(r=>mmr>=r.min)||RANKS[0]; }
function elo(win,oppMmr,myMmr){ return Math.round(32*((win?1:0)-(1/(1+Math.pow(10,(oppMmr-myMmr)/400))))); }
function roomKey(c){ return `room-${c}`; }
function genCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
function emailKey(email){ return `account-${email.trim().toLowerCase().replace(/[^a-z0-9@._-]/g,"_")}`; }

async function hashPassword(pw){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ─── AI CALL ─────────────────────────────────────────────────────────────────
let _apiKey = "";
function setApiKey(k){ _apiKey = k; }
function getApiKey(){ return _apiKey || localStorage.getItem("rizz_api_key") || ""; }

async function callAI(system, messages, diff=""){
  const key = getApiKey();
  if(!key) throw new Error("No API key");
  const sys = diff ? system+"\n"+diff : system;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages})
  });
  if(!res.ok){ const e=await res.json().catch(()=>{}); throw new Error(e?.error?.message||res.statusText); }
  const data = await res.json();
  const raw = data.content?.[0]?.text||"{}";
  try{ const m=raw.match(/\{[\s\S]*\}/); return JSON.parse(m?m[0]:raw); }
  catch{ return {reply:"Interesting attempt...",rizzScore:8,reaction:"😑"}; }
}

      const res=await fetch("https://api.anthropic.com/v1/messages",{

        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:10,messages:[{role:"user",content:"hi"}]})
      });
      if(!res.ok){ const e=await res.json().catch(()=>{}); setErr(e?.error?.message||"Invalid key."); setTesting(false); return; }

  return (

          <div style={{fontFamily:"'Permanent Marker'",color:G.muted,fontSize:13,letterSpacing:2,marginTop:6}}>⚡ Can you make the AI blush? ⚡</div>
        </div>
        <Card accent={`linear-gradient(90deg,${G.fire},${G.gold},${G.pink})`} style={{padding:28}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:14,letterSpacing:3,color:G.muted,marginBottom:6}}>ANTHROPIC API KEY</div>
          <div style={{fontSize:12,color:G.muted,marginBottom:16,lineHeight:1.6}}>
            This app runs entirely in your browser. Your API key is stored locally and never sent anywhere except directly to Anthropic.
            <br/><br/>
            Get a key at <a href="https://console.anthropic.com" target="_blank" style={{color:G.fire}}>console.anthropic.com</a>

          <Btn onClick={verify} disabled={testing||!key.trim()} style={{width:"100%",fontSize:18,padding:14}}>
            {testing?"VERIFYING...":"ENTER THE ARENA 🔥"}
          </Btn>
        </Card>
        <div style={{textAlign:"center",marginTop:12,fontSize:11,color:G.muted}}>

// ─── AUTH SCREEN ─────────────────────────────────────────────────────────────
function AuthScreen({onComplete}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [username,setUsername]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  async function register(){
    if(busy)return; setErr("");
    if(!email.trim()||!username.trim()||!pw) return setErr("All fields required.");
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email.trim())) return setErr("Enter a valid email.");
    if(username.trim().length<2) return setErr("Username must be at least 2 characters.");
    if(pw.length<6) return setErr("Password must be at least 6 characters.");
    if(pw!==pw2) return setErr("Passwords don't match.");
    setBusy(true);
    try{
      const key=emailKey(email);
      let existing=null;
      try{ const r=await storage.get(key,true); if(r) existing=JSON.parse(r.value); }catch{}
      if(existing){ setErr("An account with that email already exists."); setBusy(false); return; }
      const hash=await hashPassword(pw);
      const profile={email:email.trim().toLowerCase(),name:username.trim(),pwHash:hash,
        mmr:0,wins:0,losses:0,peakPracticeRizz:0,peakGameRizz:0,createdAt:Date.now()};
      await storage.set(key,JSON.stringify(profile),true);
      await storage.set(`player-${profile.name.toLowerCase()}`,JSON.stringify(profile),true);
      await storage.set("my-session",JSON.stringify({email:profile.email}));
      onComplete(profile);
    }catch(e){ setErr("Error creating account. Try again."); }
    setBusy(false);
  }

  async function login(){
    if(busy)return; setErr("");
    if(!email.trim()||!pw) return setErr("Email and password required.");
    setBusy(true);
    try{
      const key=emailKey(email);
      let account=null;
      try{ const r=await storage.get(key,true); if(r) account=JSON.parse(r.value); }catch{}
      if(!account){ setErr("No account found with that email."); setBusy(false); return; }
      const hash=await hashPassword(pw);
      if(hash!==account.pwHash){ setErr("Incorrect password."); setBusy(false); return; }
      await storage.set("my-session",JSON.stringify({email:account.email}));
      onComplete(account);
    }catch(e){ setErr("Login error. Try again."); }
    setBusy(false);
  }

  function submit(){ mode==="login"?login():register(); }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:420,width:"100%",animation:"fadeUp .35s ease"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:76,letterSpacing:10,background:`linear-gradient(135deg,${G.fire},${G.gold},${G.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"flicker 4s ease-in-out infinite",lineHeight:1}}>RIZZ ME</div>
          <div style={{fontFamily:"'Permanent Marker'",color:G.muted,fontSize:13,letterSpacing:2,marginTop:6}}>⚡ Can you make the AI blush? ⚡</div>
        </div>
        <div style={{display:"flex",marginBottom:20,background:G.card,border:`1px solid ${G.border}`,borderRadius:2,overflow:"hidden"}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}}
              style={{flex:1,padding:"12px 0",background:mode===m?`linear-gradient(135deg,${G.fire},${G.pink})`:"transparent",border:"none",color:mode===m?"#fff":G.muted,fontFamily:"'Bebas Neue'",fontSize:17,letterSpacing:3,cursor:"pointer",transition:"all .2s"}}>
              {m==="login"?"SIGN IN":"CREATE ACCOUNT"}
            </button>
          ))}
        </div>
        <Card accent={`linear-gradient(90deg,${G.fire},${G.gold},${G.pink})`} style={{padding:28}}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:11,letterSpacing:3,color:G.muted,marginBottom:5}}>EMAIL</div>
              <TxtInput value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="you@email.com"/>
            </div>
            {mode==="register"&&(
              <div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:11,letterSpacing:3,color:G.muted,marginBottom:5}}>DISPLAY NAME</div>
                <TxtInput value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Your rizz name"/>
              </div>
            )}
            <div>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:11,letterSpacing:3,color:G.muted,marginBottom:5}}>PASSWORD</div>
              <TxtInput value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder={mode==="register"?"At least 6 characters":"••••••••"} type="password"/>
            </div>
            {mode==="register"&&(
              <div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:11,letterSpacing:3,color:G.muted,marginBottom:5}}>CONFIRM PASSWORD</div>
                <TxtInput value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Repeat password" type="password"/>
              </div>
            )}
            {err&&<div style={{fontSize:12,color:G.pink,textAlign:"center",padding:"6px 10px",background:"rgba(255,45,120,0.1)",border:`1px solid rgba(255,45,120,0.3)`,borderRadius:2}}>{err}</div>}
            <Btn onClick={submit} disabled={busy} style={{width:"100%",fontSize:18,padding:14,marginTop:4}}>
              {busy?"LOADING...":(mode==="login"?"SIGN IN 🔥":"CREATE ACCOUNT 🔥")}
            </Btn>
          </div>
        </Card>
        <div style={{textAlign:"center",marginTop:14,fontSize:11,color:G.muted}}>
          Stats saved to your account and persist across sessions.
        </div>
      </div>
    </div>
  );
}

// ─── PRACTICE MODE ───────────────────────────────────────────────────────────

    setDisplayMsgs(m=>[...m,{type:"user",text}]);
    try{
      const parsed=await callAI(p.system,apiHistory.current);
      const score=Math.min(100,Math.max(0,parsed.rizzScore||0));
      setRizz(score);
      if(score>peakSession){ setPeakSession(score); if(score>(profile?.peakPracticeRizz||0)) onUpdateProfile({peakPracticeRizz:score}); }
      if((parsed.rizzScore||0)>(profile?.peakGameRizz||0)) onUpdateProfile({peakGameRizz:Math.round(parsed.rizzScore)});
      apiHistory.current=[...apiHistory.current,{role:"assistant",content:parsed.reply||"..."}];
      setDisplayMsgs(m=>[...m,{type:"ai",parsed}]);
      if(score>=100){ setCelebrate(true); setTimeout(()=>setCelebrate(false),3200); }
    }catch(e){
      setDisplayMsgs(m=>[...m,{type:"ai",parsed:{reply:"Something went wrong, try again.",reaction:"😅",rizzScore:rizz}}]);
    }
    setWaiting(false);
  }

  function reset(){ setDisplayMsgs([]); apiHistory.current=[]; setRizz(0); setPeakSession(0); }

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:18,maxWidth:1080,margin:"0 auto"}} className="pg">
      <style>{`@media(max-width:700px){.pg{grid-template-columns:1fr!important}}`}</style>
      <Confetti active={celebrate}/>
      <Card accent={`linear-gradient(90deg,${G.fire},${G.pink},${G.gold})`}>
        <div style={{padding:"15px 18px",borderBottom:`1px solid ${G.border}`,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${G.pink},${G.fire})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:21,flexShrink:0}}>{p.emoji}</div>
          <div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:19,letterSpacing:2}}>{p.name}</div>
            <div style={{fontSize:11,color:G.neon,display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:G.neon,display:"inline-block",animation:"pulse 2s infinite"}}/>
              waiting to be impressed
            </div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontFamily:"'Bebas Neue'",fontSize:12,letterSpacing:2,color:G.muted}}>RIZZ</span>
            <span style={{fontFamily:"'Bebas Neue'",fontSize:21,color:G.gold}}>{Math.round(rizz)}%</span>
          </div>
        </div>
        <div style={{padding:"8px 18px",borderBottom:`1px solid ${G.border}`}}><RizzBar pct={rizz}/></div>
        <div style={{height:350,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:11}}>
          <div className="mi" style={{display:"flex",gap:9}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${G.pink},${G.fire})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{p.emoji}</div>
            <div style={{maxWidth:"78%",padding:"9px 13px",background:"rgba(255,45,120,0.1)",border:`1px solid rgba(255,45,120,0.18)`,borderLeft:`3px solid ${G.pink}`,fontSize:13,lineHeight:1.6}}>{INTROS[persona]}</div>
          </div>
          {displayMsgs.map((m,i)=>m.type==="user"?(
            <div key={i} className="mi" style={{display:"flex",flexDirection:"row-reverse",gap:9}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${G.fire},${G.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>😎</div>
              <div style={{maxWidth:"78%",padding:"9px 13px",background:"rgba(255,77,0,0.1)",border:`1px solid rgba(255,77,0,0.18)`,borderRight:`3px solid ${G.fire}`,fontSize:13,lineHeight:1.6,textAlign:"right"}}>{m.text}</div>
            </div>
          ):(
            <div key={i} className="mi" style={{display:"flex",gap:9}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${G.pink},${G.fire})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{p.emoji}</div>
              <div style={{maxWidth:"78%",padding:"9px 13px",background:"rgba(255,45,120,0.1)",border:`1px solid rgba(255,45,120,0.18)`,borderLeft:`3px solid ${G.pink}`,fontSize:13,lineHeight:1.6}}>
                {m.parsed?.reply}<br/><span style={{fontSize:17}}>{m.parsed?.reaction}</span>
              </div>
            </div>
          ))}
          {waiting&&(
            <div style={{display:"flex",gap:9}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${G.pink},${G.fire})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>{p.emoji}</div>
              <TypingDots/>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>
        <div style={{padding:"11px 18px",borderTop:`1px solid ${G.border}`,display:"flex",gap:9}}>
          <TxtInput value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Drop your best line..." disabled={waiting} style={{flex:1}}/>
          <Btn onClick={send} disabled={waiting} style={{padding:"9px 18px",fontSize:14}}>SEND</Btn>
        </div>
      </Card>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Card accent={`linear-gradient(90deg,${G.gold},${G.fire})`} style={{padding:16}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:3,color:G.muted,marginBottom:10}}>🎭 PICK A VIBE</div>
          {Object.entries(PERSONAS).map(([k,v])=>(
            <button key={k} onClick={()=>{setPersona(k);reset();}}
              style={{width:"100%",padding:"8px 11px",background:persona===k?"rgba(255,77,0,0.15)":"transparent",border:`1px solid ${persona===k?G.fire:G.border}`,color:persona===k?G.text:G.muted,cursor:"pointer",textAlign:"left",marginBottom:5,borderRadius:2,transition:"all .18s",display:"flex",alignItems:"center",gap:7}}>
              <span>{v.emoji}</span><span style={{fontFamily:"'Bebas Neue'",letterSpacing:2,fontSize:13}}>{v.name}</span>
            </button>
          ))}
        </Card>
        <Card style={{padding:16}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:3,color:G.muted,marginBottom:10}}>📊 SESSION</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:50,background:`linear-gradient(135deg,${G.fire},${G.gold})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>{Math.round(peakSession)}</div>
            <div style={{fontSize:10,color:G.muted,letterSpacing:2,marginTop:3}}>PEAK THIS SESSION</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
            <div style={{textAlign:"center",padding:"8px",background:"rgba(255,215,0,0.07)",border:`1px solid rgba(255,215,0,0.2)`,borderRadius:2}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:20,color:G.gold}}>{profile?.peakPracticeRizz||0}%</div>
              <div style={{fontSize:9,color:G.muted,letterSpacing:1}}>ALL-TIME</div>
            </div>
            <div style={{textAlign:"center",padding:"8px",background:"rgba(255,45,120,0.07)",border:`1px solid rgba(255,45,120,0.2)`,borderRadius:2}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:20,color:G.pink}}>{profile?.peakGameRizz||0}%</div>
              <div style={{fontSize:9,color:G.muted,letterSpacing:1}}>BEST GAME</div>
            </div>
          </div>
          <Btn onClick={reset} v="ghost" style={{width:"100%",marginTop:10,fontSize:13,padding:"8px"}}>↩ RESET</Btn>
        </Card>
        <Card style={{padding:16}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:3,color:G.muted,marginBottom:10}}>💡 RIZZ TIPS</div>
          {[["🎯","Be original — generic lines do nothing"],["😂","Humor = instant rizz boost"],["🧠","Clever wordplay scores huge"],["😌","Confident, not arrogant"],["🎭","Match the persona's energy"]].map(([icon,tip])=>(
            <div key={tip} style={{fontSize:12,color:G.muted,lineHeight:1.7,padding:"5px 0",borderBottom:`1px solid rgba(255,255,255,0.04)`,display:"flex",gap:7}}>
              <span style={{flexShrink:0}}>{icon}</span>{tip}
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

// ─── RANKED BATTLE ───────────────────────────────────────────────────────────
const _battle={pollInterval:null,phase:"lobby",roomCode:"",playerNum:1,slotKey:null};

function RankedBattle({profile,onUpdateProfile,visible}){
  const [phase,setPhase]=useState("lobby");
  const [roomCode,setRoomCode]=useState("");
  const [joinCode,setJoinCode]=useState("");
  const [playerNum,setPlayerNum]=useState(1);
  const [roomData,setRoomData]=useState(null);
  const [myMsgs,setMyMsgs]=useState([]);
  const [myInput,setMyInput]=useState("");
  const [myRizz,setMyRizz]=useState(0);
  const [oppRizz,setOppRizz]=useState(0);
  const [waiting,setWaiting]=useState(false);
  const [myTurn,setMyTurn]=useState(false);
  const [celebrate,setCelebrate]=useState(false);
  const [result,setResult]=useState(null);
  const [statusMsg,setStatusMsg]=useState("");
  const [mmTick,setMmTick]=useState(0);
  const bottomRef=useRef();
  const phaseRef=useRef(phase);
  useEffect(()=>{ phaseRef.current=phase; _battle.phase=phase; },[phase]);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[myMsgs,waiting]);
  useEffect(()=>{ return ()=>{}; },[]);

  const RANKED_SYSTEM=PERSONAS.alexia.system+"\n"+DIFFS.medium;

  function startPolling(code,pNum){ if(_battle.pollInterval) clearInterval(_battle.pollInterval); _battle.pollInterval=setInterval(()=>pollRoom(code,pNum),POLL_MS); }

  async function pollRoom(code,pNum){
    try{
      const res=await storage.get(roomKey(code),true);
      if(!res)return;
      const room=JSON.parse(res.value);
      setRoomData(room);
      if(room.status==="playing"&&phaseRef.current==="waiting") setPhase("playing");
      if(pNum===1){ setMyRizz(room.p1?.rizz||0); setOppRizz(room.p2?.rizz||0); setMyTurn(room.turn===1); setMyMsgs(room.p1?.messages||[]); }
      else         { setMyRizz(room.p2?.rizz||0); setOppRizz(room.p1?.rizz||0); setMyTurn(room.turn===2); setMyMsgs(room.p2?.messages||[]); }
      if(room.status==="done"&&phaseRef.current!=="result"){ clearInterval(_battle.pollInterval); _battle.pollInterval=null; endGame(room,pNum); }
    }catch{}
  }

  async function createRoom(){
    const code=genCode();
    const room={code,status:"waiting",p1:{name:profile.name,mmr:profile.mmr,rizz:0,messages:[],peakGame:0},p2:null,turn:1,createdAt:Date.now()};
    await storage.set(roomKey(code),JSON.stringify(room),true);
    _battle.roomCode=code; _battle.playerNum=1;
    setRoomCode(code); setPlayerNum(1); setRoomData(room); setPhase("waiting"); setStatusMsg("");
    startPolling(code,1);
  }

  async function joinRoom(){
    const code=joinCode.trim().toUpperCase();
    if(!code){ setStatusMsg("Enter a room code first."); return; }
    try{
      const res=await storage.get(roomKey(code),true);
      if(!res){ setStatusMsg("Room not found!"); return; }
      const room=JSON.parse(res.value);
      if(room.status!=="waiting"){ setStatusMsg("Room is full or already started."); return; }
      room.p2={name:profile.name,mmr:profile.mmr,rizz:0,messages:[],peakGame:0};
      room.status="playing";
      await storage.set(roomKey(code),JSON.stringify(room),true);
      _battle.roomCode=code; _battle.playerNum=2;
      setRoomCode(code); setPlayerNum(2); setRoomData(room); setMyTurn(false); setPhase("playing");
      startPolling(code,2);
    }catch(e){ setStatusMsg("Error joining room. Try again."); }
  }

  async function findMatch(){
    setPhase("mmWaiting"); setStatusMsg("Searching...");
    const slotKey=`mq-${profile.name.toLowerCase().replace(/\s+/g,"-")}-${Date.now()}`;
    _battle.slotKey=slotKey;
    const myEntry={key:slotKey,name:profile.name,mmr:profile.mmr,ts:Date.now()};
    await storage.set(slotKey,JSON.stringify(myEntry),true);
    let ticks=0;
    if(_battle.pollInterval) clearInterval(_battle.pollInterval);
    _battle.pollInterval=setInterval(async()=>{
      ticks++; setMmTick(ticks);
      if(phaseRef.current!=="mmWaiting"){ clearInterval(_battle.pollInterval); _battle.pollInterval=null; return; }
      try{
        const mRes=await storage.get(slotKey+"_match",true);
        if(mRes){
          const info=JSON.parse(mRes.value);
          try{ await storage.delete(slotKey+"_match",true); }catch{}
          try{ await storage.delete(slotKey,true); }catch{}
          _battle.slotKey=null; _battle.roomCode=info.roomCode; _battle.playerNum=1;
          clearInterval(_battle.pollInterval); _battle.pollInterval=null;
          setRoomCode(info.roomCode); setPlayerNum(1); setMyTurn(true); setPhase("playing");
          startPolling(info.roomCode,1); return;
        }
        const listRes=await storage.list("mq-",true);
        const keys=(listRes?.keys||[]).filter(k=>k!==slotKey&&!k.endsWith("_match"));
        let opponent=null;
        for(const k of keys){
          try{ const r=await storage.get(k,true); if(!r) continue; const e=JSON.parse(r.value); if(e&&e.key&&e.ts&&Date.now()-e.ts<120000&&e.name!==profile.name){ opponent=e; break; } }catch{}
        }
        if(opponent){
          const code=genCode();
          const room={code,status:"playing",p1:{name:opponent.name,mmr:opponent.mmr,rizz:0,messages:[],peakGame:0},p2:{name:profile.name,mmr:profile.mmr,rizz:0,messages:[],peakGame:0},turn:1,createdAt:Date.now()};
          await storage.set(roomKey(code),JSON.stringify(room),true);
          await storage.set(opponent.key+"_match",JSON.stringify({roomCode:code}),true);
          try{ await storage.delete(opponent.key,true); }catch{}
          try{ await storage.delete(slotKey,true); }catch{}
          _battle.slotKey=null; _battle.roomCode=code; _battle.playerNum=2;
          clearInterval(_battle.pollInterval); _battle.pollInterval=null;
          setRoomCode(code); setPlayerNum(2); setMyTurn(false); setPhase("playing");
          startPolling(code,2);
        }
      }catch(e){ console.error("MM error",e); }
    },POLL_MS);
  }

  async function cancelMM(){
    clearInterval(_battle.pollInterval); _battle.pollInterval=null;
    if(_battle.slotKey){ try{ await storage.delete(_battle.slotKey,true); }catch{} _battle.slotKey=null; }
    setPhase("lobby");
  }

  async function sendLine(){
    if(waiting||!myTurn||!myInput.trim())return;
    const text=myInput.trim(); setMyInput(""); setWaiting(true);
    try{
      const res=await storage.get(roomKey(roomCode),true);
      const room=JSON.parse(res.value);
      const pk=playerNum===1?"p1":"p2";
      const prevMsgs=(room[pk].messages||[]).map(m=>({role:m.role,content:m.apiContent||m.content})).filter(m=>m.role&&m.content);
      const apiMsgs=[...prevMsgs,{role:"user",content:text}];
      const parsed=await callAI(PERSONAS.alexia.system,apiMsgs,DIFFS.medium);
      const score=Math.min(100,Math.max(0,parsed.rizzScore||0));
      room[pk].rizz=score;
      if((parsed.rizzScore||0)>(room[pk].peakGame||0)) room[pk].peakGame=Math.round(parsed.rizzScore);
      room[pk].messages=[...prevMsgs.map((m,i)=>({...m,apiContent:m.content,display:room[pk].messages?.[i]?.display})),{role:"user",content:text,apiContent:text,display:null},{role:"assistant",content:parsed.reply||"…",apiContent:parsed.reply||"…",display:{reply:parsed.reply,reaction:parsed.reaction}}];
      if(score>=100){ room.status="done"; room.winner=playerNum; } else room.turn=playerNum===1?2:1;
      await storage.set(roomKey(roomCode),JSON.stringify(room),true);
      setMyRizz(score); setMyTurn(false); setMyMsgs(room[pk].messages);
      if(score>=100){ clearInterval(_battle.pollInterval); _battle.pollInterval=null; endGame(room,playerNum); }
    }catch(e){ console.error(e); }
    setWaiting(false);
  }

  function endGame(room,pNum){
    const iWon=room.winner===pNum;
    const myMMR=pNum===1?room.p1.mmr:room.p2.mmr;
    const oppMMR=pNum===1?(room.p2?.mmr||0):room.p1.mmr;
    const gain=elo(iWon,oppMMR,myMMR);
    const newMMR=Math.max(0,myMMR+gain);
    const wins=(profile.wins||0)+(iWon?1:0);
    const losses=(profile.losses||0)+(iWon?0:1);
    const pk=pNum===1?"p1":"p2";
    const gameRizz=room[pk]?.peakGame||0;
    const updates={mmr:newMMR,wins,losses};
    if(gameRizz>(profile.peakGameRizz||0)) updates.peakGameRizz=gameRizz;
    onUpdateProfile(updates);
    setResult({iWon,gain,newMMR,oppName:pNum===1?room.p2?.name:room.p1?.name});
    if(iWon){ setCelebrate(true); setTimeout(()=>setCelebrate(false),3500); }
    setPhase("result");
  }

  function resetToLobby(){
    clearInterval(_battle.pollInterval); _battle.pollInterval=null;
    _battle.roomCode=""; _battle.playerNum=1; _battle.slotKey=null;
    setPhase("lobby"); setMyMsgs([]); setMyRizz(0); setOppRizz(0);
    setResult(null); setCelebrate(false); setRoomCode(""); setJoinCode(""); setStatusMsg("");
  }

  const isInGame=phase==="playing"||phase==="waiting"||phase==="mmWaiting";

  return (
    <div style={{display:visible?"block":"none"}}>
      {!visible&&isInGame&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:`linear-gradient(90deg,${G.fire},${G.pink})`,padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:1000}}>
          <span style={{fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:3}}>⚔️ GAME IN PROGRESS</span>
          <span style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>Switch to Ranked tab to play</span>
        </div>
      )}
      {phase==="result"&&result&&(
        <div className="fu" style={{maxWidth:480,margin:"0 auto",textAlign:"center"}}>
          <Confetti active={celebrate}/>
          <div style={{fontSize:68,marginBottom:14}}>{result.iWon?"🏆":"😔"}</div>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:70,letterSpacing:6,background:result.iWon?`linear-gradient(135deg,${G.fire},${G.gold})`:`linear-gradient(135deg,${G.muted},#444)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>{result.iWon?"YOU WIN!":"REKT"}</div>
          <div style={{color:G.muted,margin:"10px 0 18px",fontSize:15}}>{result.iWon?`You out-rizzed ${result.oppName}! 🔥`:`${result.oppName} had the better rizz this time.`}</div>
          <div style={{display:"inline-flex",alignItems:"center",gap:12,background:G.card,border:`1px solid ${G.border}`,padding:"14px 22px",marginBottom:22}}>
            <span style={{fontFamily:"'Bebas Neue'",fontSize:17,color:G.muted}}>MMR</span>
            <span style={{fontFamily:"'Bebas Neue'",fontSize:30,color:result.iWon?G.neon:G.pink}}>{result.iWon?"+":""}{result.gain}</span>
            <span style={{color:G.muted}}>→</span>
            <RankBadge mmr={result.newMMR} size="lg"/>
          </div>
          <br/><Btn onClick={resetToLobby} style={{fontSize:18,padding:"14px 40px"}}>PLAY AGAIN</Btn>
        </div>
      )}
      {phase==="mmWaiting"&&(
        <div className="fu" style={{maxWidth:440,margin:"0 auto",textAlign:"center"}}>
          <Card accent={`linear-gradient(90deg,${G.neon},#00AAFF)`} style={{padding:44}}>
            <div style={{fontSize:52,marginBottom:14}}>🎯</div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:28,letterSpacing:4,color:G.neon,marginBottom:10}}>FINDING MATCH</div>
            <div style={{color:G.muted,fontSize:13,marginBottom:26}}>Looking for an opponent...</div>
            <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:28}}>
              {[0,1,2].map(i=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:G.neon,animation:`pulse 1.4s ${i*300}ms ease-in-out infinite`}}/>)}
            </div>
            <div style={{fontSize:12,color:G.muted,marginBottom:20}}>Searching... {Math.floor(mmTick*POLL_MS/1000)}s</div>
            <Btn onClick={cancelMM} v="ghost" style={{width:"100%",fontSize:14}}>✕ CANCEL</Btn>
          </Card>
        </div>
      )}
      {phase==="waiting"&&(
        <div className="fu" style={{maxWidth:440,margin:"0 auto",textAlign:"center"}}>
          <Card accent={`linear-gradient(90deg,${G.fire},${G.gold})`} style={{padding:40}}>
            <div style={{fontSize:46,marginBottom:14}}>⏳</div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:28,letterSpacing:4,color:G.gold,marginBottom:6}}>ROOM CREATED</div>
            <div style={{color:G.muted,marginBottom:20,fontSize:13}}>Share this code with your opponent</div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:54,letterSpacing:14,color:G.text,background:"rgba(255,255,255,0.05)",padding:"18px 28px",border:`2px dashed ${G.fire}`,marginBottom:22}}>{roomCode}</div>
            <div style={{display:"flex",alignItems:"center",gap:7,justifyContent:"center",color:G.muted,fontSize:13}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:G.neon,display:"inline-block",animation:"pulse 1.5s infinite"}}/>
              Waiting for opponent...
            </div>
            <Btn onClick={()=>{ clearInterval(_battle.pollInterval); _battle.pollInterval=null; setPhase("lobby"); }} v="ghost" style={{marginTop:18,width:"100%",fontSize:13}}>CANCEL</Btn>
          </Card>
        </div>
      )}
      {phase==="playing"&&(()=>{
        const oppName=playerNum===1?roomData?.p2?.name:roomData?.p1?.name;
        return (
          <div className="fu" style={{maxWidth:680,margin:"0 auto"}}>
            <Confetti active={celebrate}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:10,marginBottom:16}}>
              <Card style={{padding:12,borderLeft:`3px solid ${G.fire}`}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:15,letterSpacing:2,color:G.fire}}>{profile.name}</div>
                <RizzBar pct={myRizz} color={G.fire} h={7}/>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:11,color:G.muted,marginTop:3}}>{Math.round(myRizz)}%</div>
              </Card>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:26,color:G.gold,textShadow:`0 0 18px rgba(255,215,0,.5)`}}>VS</div>
              <Card style={{padding:12,borderRight:`3px solid ${G.neon}`}}>

// ─── LEADERBOARD ─────────────────────────────────────────────────────────────
const MEDALS=["🥇","🥈","🥉"];
function Leaderboard(){
  const TABS=[
    {k:"mmr",    label:"⚔️ RANKED",   val:p=>({num:p.mmr||0,unit:"MMR",color:G.fire}),    sort:(a,b)=>(b.mmr||0)-(a.mmr||0)},
    {k:"peak",   label:"🎯 PEAK RIZZ",val:p=>({num:(p.peakPracticeRizz||0)+"%",unit:"PRACTICE",color:G.pink}), sort:(a,b)=>(b.peakPracticeRizz||0)-(a.peakPracticeRizz||0)},
    {k:"game",   label:"🔥 BEST GAME",val:p=>({num:(p.peakGameRizz||0)+"%",unit:"GAME",color:G.gold}),         sort:(a,b)=>(b.peakGameRizz||0)-(a.peakGameRizz||0)},
    {k:"wr",     label:"📊 WIN RATE",  val:p=>{const t=Math.max(1,(p.wins||0)+(p.losses||0));return{num:Math.round(((p.wins||0)/t)*100)+"%",unit:`${p.wins||0}W ${p.losses||0}L`,color:G.neon};},sort:(a,b)=>{const ta=Math.max(1,(a.wins||0)+(a.losses||0)),tb=Math.max(1,(b.wins||0)+(b.losses||0));return((b.wins||0)/tb)-((a.wins||0)/ta);}},
  ];
  const [activeTab,setActiveTab]=useState("mmr");
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);
  const curTab=TABS.find(t=>t.k===activeTab);

  async function load(){
    setLoading(true);
    try{
      const res=await storage.list("player-",true);
      const keys=res?.keys||[];
      const players=[];
      for(const k of keys){
        try{ const r=await storage.get(k,true); if(r){ const p=JSON.parse(r.value); if(p&&p.name) players.push(p); } }catch{}
      }
      setEntries(players.sort(curTab.sort).slice(0,25));
    }catch{}
    setLoading(false);
  }

  useEffect(()=>{ load(); },[activeTab]);

  return (
    <div style={{maxWidth:680,margin:"0 auto",padding:20}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:44,letterSpacing:6,background:`linear-gradient(90deg,${G.gold},${G.fire})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🏆 LEADERBOARD</div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap",justifyContent:"center"}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>setActiveTab(t.k)}
            style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:2,padding:"8px 14px",border:`2px solid ${activeTab===t.k?G.fire:G.border}`,background:activeTab===t.k?"rgba(255,77,0,0.14)":"transparent",color:activeTab===t.k?G.text:G.muted,cursor:"pointer",clipPath:"polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%)",transition:"all .2s"}}>
            {t.label}
          </button>
        ))}
      </div>
      <Card accent={`linear-gradient(90deg,${G.gold},${G.fire},${G.pink})`}>
        {loading?(
          <div style={{padding:56,textAlign:"center",color:G.muted}}><Spinner/><div style={{marginTop:12,fontSize:13}}>Loading...</div></div>
        ):entries.length===0?(
          <div style={{padding:56,textAlign:"center",color:G.muted,fontSize:14}}>No players yet — be the first on the board!</div>
        ):entries.map((p,i)=>{
          const wr=(p.wins||p.losses)?Math.round(((p.wins||0)/Math.max(1,(p.wins||0)+(p.losses||0)))*100):null;
          const val=curTab.val(p);
          return (
            <div key={p.name+i} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 18px",borderBottom:i<entries.length-1?`1px solid ${G.border}`:"none",background:i<3?`rgba(255,215,0,${0.05-i*0.012})`:"transparent",animation:`fadeUp ${0.18+i*0.035}s ease`}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:i<3?21:15,minWidth:32,textAlign:"center"}}>{i<3?MEDALS[i]:<span style={{color:G.muted}}>#{i+1}</span>}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:15,letterSpacing:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                <div style={{fontSize:11,color:G.muted,marginTop:2}}>{p.wins||0}W {p.losses||0}L {wr!==null?`· ${wr}% WR`:""}</div>
              </div>
              <RankBadge mmr={p.mmr||0}/>
              <div style={{textAlign:"right",minWidth:68}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:17,color:val.color}}>{val.num}</div>
                <div style={{fontSize:9,color:G.muted,letterSpacing:1}}>{val.unit}</div>
              </div>
            </div>
          );
        })}
      </Card>
      <div style={{textAlign:"center",marginTop:10}}>
        <button onClick={load} style={{background:"none",border:"none",color:G.muted,cursor:"pointer",fontSize:12,fontFamily:"'Outfit'"}}>↻ Refresh</button>
      </div>
    </div>
  );
}

          ctx.lineWidth=1.4;ctx.strokeStyle="rgba(30,10,5,0.7)";ctx.beginPath();ctx.moveTo(x-13,y);ctx.bezierCurveTo(x-5,y+h*0.4,x+5,y+h*0.4,x+13,y+droop);ctx.stroke();

          ctx.save();ctx.beginPath();ctx.moveTo(x-14,y);ctx.bezierCurveTo(x-5,y-h,x+5,y-h,x+14,y);ctx.bezierCurveTo(x+5,y+h,x-5,y+h,x-14,y);ctx.clip();
          ctx.fillStyle="#1A0808";ctx.beginPath();ctx.ellipse(x+s.pupilX,y+s.pupilY,9,Math.min(h,10),0,0,Math.PI*2);ctx.fill();
          ctx.fillStyle="#080304";ctx.beginPath();ctx.ellipse(x+s.pupilX*1.05,y+s.pupilY*1.05,5,Math.min(h*0.55,5.5),0,0,Math.PI*2);ctx.fill();
          ctx.fillStyle="rgba(255,255,255,0.88)";ctx.beginPath();ctx.ellipse(x+s.pupilX+2.5,y+s.pupilY-2.5,1.9,1.4,0,0,Math.PI*2);ctx.fill();ctx.restore();
          ctx.strokeStyle="#080304";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(x-14,y);ctx.bezierCurveTo(x-5,y-h,x+5,y-h,x+14,y);ctx.stroke();
          ctx.lineWidth=1.2;ctx.strokeStyle="rgba(8,3,4,0.6)";ctx.beginPath();ctx.moveTo(x-14,y);ctx.bezierCurveTo(x-5,y+h,x+5,y+h,x+14,y);ctx.stroke();
        }
      }
      drawEye(cx-30,cy-10,s.eyeOpenL,"L");

      // Nose
      ctx.strokeStyle=darken(c.skin,28);ctx.lineCap="round";
      if(persona==="alexia"){ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx-4,cy+8);ctx.bezierCurveTo(cx-7,cy+22,cx-5,cy+28,cx-4,cy+31);ctx.quadraticCurveTo(cx,cy+33,cx+4,cy+31);ctx.bezierCurveTo(cx+5,cy+28,cx+7,cy+22,cx+4,cy+8);ctx.stroke();ctx.strokeStyle=darken(c.skin,36);ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(cx-7,cy+31,3,Math.PI,0);ctx.stroke();ctx.beginPath();ctx.arc(cx+7,cy+31,3,Math.PI,0);ctx.stroke();}
      else if(persona==="luna"){ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(cx-3,cy+7);ctx.bezierCurveTo(cx-8,cy+20,cx-7,cy+28,cx-5,cy+32);ctx.quadraticCurveTo(cx,cy+34,cx+5,cy+32);ctx.bezierCurveTo(cx+7,cy+28,cx+8,cy+20,cx+3,cy+7);ctx.stroke();ctx.strokeStyle=darken(c.skin,38);ctx.lineWidth=1.3;ctx.beginPath();ctx.arc(cx-7,cy+32,3.5,Math.PI,0);ctx.stroke();ctx.beginPath();ctx.arc(cx+7,cy+32,3.5,Math.PI,0);ctx.stroke();}
      else{ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(cx-6,cy+8);ctx.bezierCurveTo(cx-10,cy+22,cx-9,cy+28,cx-6,cy+31);ctx.quadraticCurveTo(cx,cy+34,cx+6,cy+31);ctx.bezierCurveTo(cx+9,cy+28,cx+10,cy+22,cx+6,cy+8);ctx.stroke();ctx.strokeStyle=darken(c.skin,25);ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(cx-9,cy+31,5,Math.PI,0);ctx.stroke();ctx.beginPath();ctx.arc(cx+9,cy+31,5,Math.PI,0);ctx.stroke();}

// ─── VOICE MODE ───────────────────────────────────────────────────────────────
// Key fixes vs Claude-artifact version:
// 1. Press-and-HOLD mic button (pointerdown/pointerup) for PTT
// 2. Speech synthesis voices loaded async via onvoiceschanged
// 3. Works outside sandbox — no iframe restrictions
function VoiceMode({profile,onUpdateProfile}){
  const [persona,setPersona]=useState("alexia");
  const [phase,setPhase]=useState("idle"); // idle | listening | thinking | talking
  const [transcript,setTranscript]=useState("");
  const [lastUserLine,setLastUserLine]=useState("");
  const [lastReply,setLastReply]=useState("");
  const [rizz,setRizz]=useState(0);
  const [celebrate,setCelebrate]=useState(false);
  const [statusText,setStatusText]=useState("Hold the mic button to talk");
  const [supported,setSupported]=useState(true);
  const [errMsg,setErrMsg]=useState("");

  const apiHistory=useRef([]);
  const synthRef=useRef(null);
  const recognRef=useRef(null);
  const isHoldingRef=useRef(false);
  const isTalking=phase==="talking";
  const isListening=phase==="listening";
  const p=PERSONAS[persona];

  // Init synthesis
  useEffect(()=>{
    if(!("speechSynthesis" in window)||(!("webkitSpeechRecognition" in window)&&!("SpeechRecognition" in window))){
      setSupported(false); return;
    }
    synthRef.current=window.speechSynthesis;
    return()=>{ synthRef.current?.cancel(); recognRef.current?.abort(); };
  },[]);

  function resetChat(){
    synthRef.current?.cancel();
    recognRef.current?.abort();
    apiHistory.current=[];
    setPhase("idle");setRizz(0);setTranscript("");setLastUserLine("");setLastReply("");
    setStatusText("Hold the mic button to talk");setErrMsg("");
  }

  useEffect(()=>{ resetChat(); },[persona]);

  function stopAll(){
    synthRef.current?.cancel();
    recognRef.current?.abort();
    setPhase("idle");
    setStatusText("Hold mic to talk");
  }

  // ── HOLD TO TALK — starts recognition on pointer down ─────────────────────
  function onMicDown(e){
    e.preventDefault(); // prevent ghost mouse events on touch
    if(phase==="thinking") return; // can't interrupt thinking
    if(phase==="talking"){ stopAll(); return; } // tap to skip while she's talking
    if(phase==="listening") return; // already listening
    if(!supported){ setErrMsg("Speech recognition not supported. Use Chrome or Edge."); return; }

    synthRef.current?.cancel();
    isHoldingRef.current=true;

    const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
    const recog=new SpeechRecognition();
    recognRef.current=recog;
    recog.continuous=true; // keep going as long as held
    recog.interimResults=true;
    recog.lang="en-US";

    let finalText="";
    setPhase("listening");setTranscript("");setStatusText("Listening... speak now 🎙️");setErrMsg("");

    recog.onresult=(e)=>{
      let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) finalText+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      setTranscript(finalText||interim);
    };
    recog.onerror=(e)=>{
      isHoldingRef.current=false;
      setPhase("idle");
      if(e.error==="not-allowed"||e.error==="permission-denied") setErrMsg("Mic permission denied. Allow mic access in your browser.");
      else if(e.error==="no-speech") setErrMsg("No speech detected. Try again.");
      else setErrMsg(`Mic error: ${e.error}`);
      setStatusText("Hold mic to talk");
    };
    recog.onend=()=>{
      if(finalText.trim()&&isHoldingRef.current===false){
        handleUserSpeech(finalText.trim());
      }else if(!finalText.trim()){
        setPhase("idle");
        setStatusText("Hold mic to talk");
      }
    };
    recog.start();
  }

  function onMicUp(e){
    e.preventDefault();
    if(!isHoldingRef.current) return;
    isHoldingRef.current=false;
    // Stop recognition — will trigger onend which calls handleUserSpeech
    recognRef.current?.stop();
    setStatusText("Processing... 💭");
  }

  async function handleUserSpeech(text){
    setLastUserLine(text);
    setPhase("thinking");
    setStatusText("She's thinking... 💭");
    apiHistory.current=[...apiHistory.current,{role:"user",content:text}];
    try{
      const parsed=await callAI(p.system,apiHistory.current);
      const score=Math.min(100,Math.max(0,parsed.rizzScore||0));
      setRizz(score);
      if(score>(profile?.peakPracticeRizz||0)) onUpdateProfile({peakPracticeRizz:score});
      if(score>(profile?.peakGameRizz||0)) onUpdateProfile({peakGameRizz:score});
      apiHistory.current=[...apiHistory.current,{role:"assistant",content:parsed.reply||"..."}];
      const reply=parsed.reply||"Hmm.";
      setLastReply(reply);
      if(score>=100){setCelebrate(true);setTimeout(()=>setCelebrate(false),3500);}
      speakReply(reply);
    }catch(e){
      setPhase("idle");
      setErrMsg("AI error — tap to retry");
      setStatusText("Hold mic to talk");
    }
  }

  function speakReply(text){
    const synth=synthRef.current;
    if(!synth){setPhase("idle");return;}
    synth.cancel();

    function doSpeak(){
      const utt=new SpeechSynthesisUtterance(text);
      // Load voices — they're async in Chrome
      const voices=synth.getVoices();
      const preferred=voices.find(v=>
        v.name==="Google UK English Female"||
        v.name==="Samantha"||
        v.name==="Microsoft Zira Desktop"||
        v.name==="Karen"||
        (v.lang.startsWith("en")&&v.name.toLowerCase().includes("female"))
      )||voices.find(v=>v.lang.startsWith("en"))||voices[0];
      if(preferred) utt.voice=preferred;
      utt.lang="en-US";
      utt.pitch=persona==="luna"?1.12:persona==="grace"?1.0:1.06;
      utt.rate=persona==="grace"?1.05:persona==="luna"?0.9:0.95;
      utt.volume=1;
      utt.onstart=()=>{setPhase("talking");setStatusText("She's talking... 💬");};
      utt.onend=()=>{setPhase("idle");setStatusText("Hold mic to talk 🎙️");};
      utt.onerror=(e)=>{setPhase("idle");setStatusText("Hold mic to talk 🎙️");};
      synth.speak(utt);
    }

    // Chrome workaround: voices may not be loaded yet
    if(synth.getVoices().length>0){
      doSpeak();
    }else{
      synth.onvoiceschanged=()=>{ synth.onvoiceschanged=null; doSpeak(); };
      // Fallback if onvoiceschanged never fires
      setTimeout(()=>{ if(synth.getVoices().length>0) doSpeak(); },500);
    }
  }

  if(!supported) return (
    <div style={{maxWidth:560,margin:"0 auto",padding:20}}>
      <Card style={{padding:40,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>🎤</div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:3,marginBottom:10}}>VOICE MODE</div>
        <div style={{color:G.muted,fontSize:14,lineHeight:1.6}}>
          Voice mode requires Chrome or Edge.<br/>
          Open this file in Chrome for the best experience.
        </div>
      </Card>
    </div>
  );

  return (
    <div style={{maxWidth:560,margin:"0 auto",padding:20}}>
      {celebrate&&<Confetti active/>}
      <div style={{display:"flex",flexDirection:"column",gap:18}}>

        {/* Persona picker */}
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          {Object.entries(PERSONAS).map(([k,v])=>(
            <button key={k} onClick={()=>setPersona(k)}
              style={{flex:1,padding:"10px 6px",fontFamily:"'Bebas Neue'",fontSize:15,letterSpacing:2,
                background:persona===k?`linear-gradient(135deg,${G.fire},${G.pink})`:"transparent",
                border:`2px solid ${persona===k?G.fire:G.border}`,color:persona===k?"#fff":G.muted,
                cursor:"pointer",clipPath:"polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)",transition:"all .2s"}}>
              {v.emoji} {v.name}
            </button>
          ))}
        </div>

        {/* Face + rizz */}
        <Card accent={`linear-gradient(90deg,${G.fire},${G.gold},${G.pink})`} style={{padding:20,textAlign:"center"}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:4,color:G.muted,marginBottom:10}}>{p.emoji} {p.name}</div>
          <AiFace isTalking={isTalking} isListening={isListening} rizzLevel={rizz} persona={persona}/>
          <div style={{marginTop:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:12,letterSpacing:2,color:G.muted}}>RIZZ LEVEL</span>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:15,color:rizz>=80?G.gold:rizz>=50?G.fire:G.muted}}>{rizz}%</span>
            </div>
            <RizzBar pct={rizz} color={rizz>=80?G.gold:rizz>=50?G.fire:G.pink}/>
          </div>
          {lastReply&&(
            <div style={{marginTop:14,padding:"10px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${G.border}`,borderRadius:2,fontSize:13,color:G.text,fontStyle:"italic",textAlign:"left"}}>
              "{lastReply}"
            </div>
          )}
          {lastUserLine&&(
            <div style={{marginTop:8,fontSize:11,color:G.muted,textAlign:"right"}}>You: "{lastUserLine}"</div>
          )}
        </Card>

        {/* Status */}
        <div style={{textAlign:"center",fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:3,color:G.muted,minHeight:24}}>
          {phase==="thinking"?<TypingDots/>:<span>{statusText}</span>}
        </div>
        {isListening&&transcript&&(
          <div style={{textAlign:"center",fontSize:13,color:G.neon,fontStyle:"italic",padding:"8px 14px",background:"rgba(0,255,178,0.06)",border:`1px solid rgba(0,255,178,0.15)`,borderRadius:4}}>"{transcript}"</div>
        )}
        {errMsg&&(
          <div style={{textAlign:"center",fontSize:12,color:G.pink,padding:"8px 14px",background:"rgba(255,45,120,0.08)",border:`1px solid rgba(255,45,120,0.2)`,borderRadius:4}}>{errMsg}</div>
        )}

        {/* HOLD-TO-TALK MIC */}
        <div style={{textAlign:"center",userSelect:"none"}}>
          <button
            onPointerDown={onMicDown}
            onPointerUp={onMicUp}
            onPointerLeave={onMicUp}
            onContextMenu={e=>e.preventDefault()}
            style={{
              width:110,height:110,borderRadius:"50%",
              background:isListening
                ?`radial-gradient(circle,#00FFB2,#007755)`
                :phase==="talking"
                  ?`radial-gradient(circle,${G.gold},#CC8800)`
                  :phase==="thinking"
                    ?`radial-gradient(circle,${G.muted},#333)`
                    :`radial-gradient(circle,${G.fire},${G.pink})`,
              border:"none",cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:42,margin:"0 auto",
              boxShadow:isListening
                ?`0 0 0 8px rgba(0,255,178,0.3),0 0 0 16px rgba(0,255,178,0.1)`
                :phase==="talking"
                  ?`0 0 20px rgba(255,215,0,0.4)`
                  :`0 0 30px rgba(255,77,0,0.4)`,
              transition:"all .15s",
              animation:isListening?"listeningPulse 1.2s ease-in-out infinite":phase==="idle"?"micPulse 2.5s ease-in-out infinite":"none",
              WebkitTapHighlightColor:"transparent",
              touchAction:"none",
            }}
          >
            {isListening?"🔴":phase==="talking"?"🔇":phase==="thinking"?"⏳":"🎙️"}
          </button>
          <div style={{marginTop:12,fontFamily:"'Bebas Neue'",fontSize:14,letterSpacing:2,color:isListening?G.neon:G.muted}}>
            {isListening?"RELEASE TO SEND":phase==="talking"?"TAP TO SKIP":phase==="thinking"?"THINKING...":"HOLD TO TALK"}
          </div>
        </div>

        {/* Tips */}
        <Card style={{padding:14}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:11,letterSpacing:3,color:G.muted,marginBottom:8}}>💡 HOW TO USE</div>
          {[["🎤","Hold the mic button and speak"],["📤","Release to send your line"],["🔇","Tap while she's talking to skip"],["😏","Be confident — tone matters"],["🔑","Requires mic permission in browser"]].map(([ic,tip])=>(
            <div key={tip} style={{fontSize:11,color:G.muted,padding:"4px 0",borderBottom:`1px solid rgba(255,255,255,0.04)`,display:"flex",gap:6}}><span>{ic}</span>{tip}</div>
          ))}
        </Card>

        <Btn onClick={resetChat} v="ghost" style={{width:"100%",fontSize:13,padding:"9px"}}>↩ RESET CONVERSATION</Btn>
      </div>
    </div>
  );
}

// ─── ROOT APP ────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("boot"); // boot | apikey | auth | app
  const [profile,setProfile]=useState(null);
  const [tab,setTab]=useState("practice");
  const profileRef=useRef(null);

  useEffect(()=>{
    (async()=>{
      // Check API key
      const key=localStorage.getItem("rizz_api_key");
      if(!key||!key.startsWith("sk-")){ setScreen("apikey"); return; }
      _apiKey=key;
      // Try to restore session
      try{
        const sess=await storage.get("my-session");
        if(sess){
          const {email}=JSON.parse(sess.value);
          const acc=await storage.get(emailKey(email),true);
          if(acc){ const p=JSON.parse(acc.value); profileRef.current=p; setProfile(p); setScreen("app"); return; }
        }
      }catch{}
      setScreen("auth");
    })();
  },[]);

  async function updateProfile(updates){
    const base=profileRef.current||{};
    const np={...base,...updates};
    profileRef.current=np;
    setProfile({...np});
    try{
      if(np.email){
        await storage.set(emailKey(np.email),JSON.stringify(np),true);
        await storage.set(`player-${(np.name||"unknown").toLowerCase()}`,JSON.stringify(np),true);
      }
    }catch(e){console.error("save failed",e);}
  }

  async function logout(){
    try{ await storage.delete("my-session"); }catch{}
    profileRef.current=null; setProfile(null); setScreen("auth"); setTab("practice");
  }

  function changeApiKey(){
    localStorage.removeItem("rizz_api_key");
    _apiKey="";
    setScreen("apikey");
  }

  if(screen==="boot") return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;
  if(screen==="apikey") return <ApiKeySetup onReady={()=>setScreen("auth")}/>;
  if(screen==="auth") return <AuthScreen onComplete={p=>{profileRef.current=p;setProfile(p);setScreen("app");}}/>;

  const TABS=[{k:"practice",l:"🎯 PRACTICE"},{k:"voice",l:"🎤 VOICE"},{k:"ranked",l:"⚔️ RANKED"},{k:"leaderboard",l:"🏆 LEADERBOARD"}];

  return (
    <>
      <div style={{position:"fixed",inset:0,background:`radial-gradient(ellipse at 18% 50%,rgba(255,77,0,0.055) 0%,transparent 52%),radial-gradient(ellipse at 82% 18%,rgba(255,45,120,0.055) 0%,transparent 52%)`,pointerEvents:"none"}}/>

      <header style={{textAlign:"center",padding:"28px 20px 18px"}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:"clamp(42px,9vw,88px)",letterSpacing:10,background:`linear-gradient(135deg,${G.fire},${G.gold},${G.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"flicker 4s ease-in-out infinite",lineHeight:1}}>RIZZ ME</div>
        <div style={{fontFamily:"'Permanent Marker'",color:G.muted,fontSize:12,letterSpacing:2,marginTop:4}}>⚡ Can you make the AI blush? ⚡</div>
        <div style={{display:"inline-flex",alignItems:"center",gap:10,marginTop:10,padding:"7px 15px",background:G.card,border:`1px solid ${G.border}`,borderRadius:2,flexWrap:"wrap",justifyContent:"center"}}>
          <span style={{fontFamily:"'Bebas Neue'",fontSize:14,letterSpacing:2}}>{profile.name}</span>
          <RankBadge mmr={profile.mmr||0}/>
          <span style={{fontSize:11,color:G.muted}}>{profile.wins||0}W {profile.losses||0}L</span>
          <button onClick={logout} style={{background:"none",border:`1px solid ${G.border}`,color:G.muted,cursor:"pointer",fontSize:10,fontFamily:"'Bebas Neue'",letterSpacing:1,padding:"3px 8px",borderRadius:2}}>LOGOUT</button>
          <button onClick={changeApiKey} style={{background:"none",border:`1px solid ${G.border}`,color:G.muted,cursor:"pointer",fontSize:10,fontFamily:"'Bebas Neue'",letterSpacing:1,padding:"3px 8px",borderRadius:2}}>🔑 KEY</button>
        </div>
      </header>

      <nav style={{display:"flex",justifyContent:"center",gap:8,padding:"0 16px 24px",flexWrap:"wrap"}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:3,padding:"10px 24px",border:`2px solid ${tab===t.k?G.fire:G.border}`,background:tab===t.k?"rgba(255,77,0,0.14)":"transparent",color:tab===t.k?G.text:G.muted,cursor:"pointer",clipPath:"polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%)",transition:"all .2s"}}>
            {t.l}
          </button>
        ))}
      </nav>

      <main style={{padding:"0 16px 80px"}}>
        {tab==="practice"    && <PracticeMode    profile={profile} onUpdateProfile={updateProfile}/>}
        {tab==="voice"       && <VoiceMode       profile={profile} onUpdateProfile={updateProfile}/>}
        <RankedBattle profile={profile} onUpdateProfile={updateProfile} visible={tab==="ranked"}/>
        {tab==="leaderboard" && <Leaderboard/>}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
